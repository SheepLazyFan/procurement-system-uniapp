# =============================================
# 采购系统 — 开发环境配置
# =============================================
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/procurement_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: ${DB_PASSWORD:your_dev_password}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 30000

  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 3000ms

# 开发环境开启 SQL 日志
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 开发环境开启 Knife4j
springdoc:
  swagger-ui:
    enabled: true

# =============================================
# 微信小程序 — 开发环境默认凭据
# =============================================
# 仅用于本地开发/联调，请勿将真实生产凭据提交至代码库
wx:
  miniapp:
    app-id: ${WX_APP_ID:wxb0ddba593d8a2497}
    app-secret: ${WX_APP_SECRET:your_wx_app_secret}
  subscribe:
    stock-warning-template-id: ${WX_STOCK_WARNING_TEMPLATE_ID:your_template_id}
    backup-alert-template-id: ${WX_BACKUP_ALERT_TEMPLATE_ID:}

# JWT — 开发环境允许降级占位密钥
jwt:
  secret: ${JWT_SECRET:dev-only-insecure-key-NEVER-use-in-production}
