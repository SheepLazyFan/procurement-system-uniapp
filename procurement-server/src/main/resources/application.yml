# =============================================
# 采购系统 — Spring Boot 主配置
# =============================================
spring:
  application:
    name: procurement-server
  profiles:
    active: dev
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

server:
  port: 8080
  servlet:
    context-path: /api

# =============================================
# MyBatis-Plus 配置
# =============================================
mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.procurement.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# =============================================
# JWT 配置
# =============================================
jwt:
  secret: procurement-system-jwt-secret-key-2026-please-change-in-production
  expiration: 604800000  # 7天 = 7 * 24 * 60 * 60 * 1000

# =============================================
# 微信小程序配置
# =============================================
wx:
  miniapp:
    app-id: ${WX_APP_ID:your-app-id}
    app-secret: ${WX_APP_SECRET:your-app-secret}

# =============================================
# 腾讯云配置
# =============================================
tencent:
  cos:
    secret-id: ${COS_SECRET_ID:your-secret-id}
    secret-key: ${COS_SECRET_KEY:your-secret-key}
    region: ap-guangzhou
    bucket: ${COS_BUCKET:procurement-xxx-12345678}
  sms:
    secret-id: ${SMS_SECRET_ID:your-secret-id}
    secret-key: ${SMS_SECRET_KEY:your-secret-key}
    sdk-app-id: ${SMS_SDK_APP_ID:your-sdk-app-id}
    sign-name: ${SMS_SIGN_NAME:采购系统}
    template-id: ${SMS_TEMPLATE_ID:your-template-id}
