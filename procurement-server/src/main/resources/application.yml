# =============================================
# 采购系统 — Spring Boot 主配置
# =============================================
spring:
  application:
    name: procurement-server
  profiles:
    active: dev
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      timeout: 3000ms

server:
  port: 8080
  servlet:
    context-path: /api

# 应用版本号（从配置读取，供 /statistics/version 接口返回）
app:
  version: v2026.04.10

# =============================================
# MyBatis-Plus 配置
# =============================================
mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.procurement.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# =============================================
# JWT 配置
# =============================================
jwt:
  # 密钥通过环境变量注入；dev 默认值在 application-dev.yml，prod 强制设置（见 application-prod.yml）
  secret: ${JWT_SECRET}
  expiration: 604800000  # 7天 = 7 * 24 * 60 * 60 * 1000

# =============================================
# 微信小程序配置
# =============================================
wx:
  miniapp:
    # 通过环境变量注入；各 profile 的默认值在对应 yml 中覆盖
    # dev 默认值见 application-dev.yml；prod 必须设置环境变量
    app-id: ${WX_APP_ID}
    app-secret: ${WX_APP_SECRET}
  subscribe:
    # 库存预警订阅消息模板 ID
    stock-warning-template-id: ${WX_STOCK_WARNING_TEMPLATE_ID}
    # 备份告警模板 ID（可选，留空则仅记录日志）
    backup-alert-template-id: ${WX_BACKUP_ALERT_TEMPLATE_ID:}

# =============================================
# 数据备份配置
# =============================================
backup:
  dir: ${BACKUP_DIR:backup}
  auto:
    # 自动备份 cron 表达式（默认每天凌晨 3:00）
    cron: ${BACKUP_AUTO_CRON:0 0 3 * * ?}

# =============================================
# 腾讯云配置
# =============================================

# 本地文件存储目录（开发阶段）— TODO: 后续部署迁移至腾讯云 COS
file:
  local-storage-dir: ${FILE_LOCAL_DIR:data/image}

tencent:
  cos:
    secret-id: ${COS_SECRET_ID:your-secret-id}
    secret-key: ${COS_SECRET_KEY:your-secret-key}
    region: ap-guangzhou
    bucket: ${COS_BUCKET:procurement-xxx-12345678}
  # SMS 短信服务已废弃 — 全部使用微信授权登录，无需验证码
