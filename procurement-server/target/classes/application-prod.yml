# =============================================
# 采购系统 — 生产环境配置
# =============================================
spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/procurement_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}  # 生产必填，未设置则启动报错
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 30000

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 3000ms

# 生产环境关闭 SQL 日志
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

# 生产环境完全关闭 Swagger UI 和 API 文档端点
springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false

# =============================================
# 安全配置覆盖（生产环境必须通过环境变量注入）
# =============================================

# JWT 密钥 — 生产强制使用环境变量，无默认值（未设置时启动即报错）
jwt:
  secret: ${JWT_SECRET}

# 微信凭据 — 生产强制使用环境变量，无默认值
wx:
  miniapp:
    app-id: ${WX_APP_ID}
    app-secret: ${WX_APP_SECRET}

# =============================================
# CORS 生产配置
# =============================================
# 微信小程序通过 wx.request 发起请求，CORS 由微信容器控制；
# 此处限制来源用于保护 Swagger/Admin 等浏览器访问场景
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:https://servicewechat.com}

# =============================================
# Swagger 安全配置 — 生产禁止访问 API 文档端点
# =============================================
swagger:
  security:
    permit: false
