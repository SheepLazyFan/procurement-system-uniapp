# 采购系统自动部署流水线
# 策略：GitHub Actions 跑测试 → SSH 到服务器拉代码编译部署
# 避免 SCP 上传大 JAR（服务器带宽仅 3Mbps）

name: Build & Deploy

on:
  push:
    branches:
      - 'appmod/java-upgrade-20260302-001'
    paths:
      - 'procurement-server/**'
      - '.github/workflows/**'
  workflow_dispatch:  # 允许手动触发

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests
        working-directory: procurement-server
        run: mvn test -B

  deploy:
    name: Deploy to Server
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -e
            echo "=== 1. Pull latest code ==="
            cd /opt/procurement/source || {
              echo "First time setup: cloning repo..."
              git clone https://github.com/SheepLazyFan/procurement-system-uniapp.git /opt/procurement/source
              cd /opt/procurement/source
            }
            git fetch origin
            git checkout appmod/java-upgrade-20260302-001
            git pull origin appmod/java-upgrade-20260302-001

            echo "=== 2. Build JAR ==="
            cd procurement-server
            mvn package -B -DskipTests -q

            echo "=== 3. Deploy & Restart ==="
            cp target/procurement-server-1.0.0.jar /opt/procurement/procurement-server-1.0.0.jar
            systemctl restart procurement
            sleep 5
            systemctl is-active procurement
            echo "=== Deploy complete! ==="
