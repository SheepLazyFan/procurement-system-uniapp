# 采购系统自动部署流水线
# 触发条件：push 到默认分支时自动构建、测试并部署到腾讯云服务器

name: Build & Deploy

on:
  push:
    branches:
      - 'appmod/java-upgrade-20260302-001'
    paths:
      - 'procurement-server/**'
      - '.github/workflows/**'
  workflow_dispatch:  # 允许手动触发

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 安装 JDK 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      # 3. 运行测试
      - name: Run tests
        working-directory: procurement-server
        run: mvn test -B

      # 4. 打包 JAR（跳过测试，前面已跑过）
      - name: Build JAR
        working-directory: procurement-server
        run: mvn package -B -DskipTests

      # 5. 上传 JAR 到服务器
      - name: Deploy JAR via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "procurement-server/target/procurement-server-1.0.0.jar"
          target: "/opt/procurement/"
          strip_components: 2

      # 6. SSH 重启服务
      - name: Restart service via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            systemctl restart procurement
            sleep 5
            systemctl is-active procurement
