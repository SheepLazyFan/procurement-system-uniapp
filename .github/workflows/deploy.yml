# 采购系统 CI 流水线
# 每次 push 自动运行 77 个 JUnit 测试，确保代码质量
# 部署仍通过手动 deploy.sh 执行（服务器带宽限制，不适合自动 SCP）

name: CI - Test

on:
  push:
    branches:
      - 'main'
    paths:
      - 'procurement-server/**'
      - '.github/workflows/**'
  pull_request:
    branches:
      - 'main'
  workflow_dispatch:

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests
        working-directory: procurement-server
        run: mvn test -B

      - name: Build JAR (verify)
        working-directory: procurement-server
        run: mvn package -B -DskipTests
