# 采购系统 CI 流水线
# 后端：96 个 JUnit 5 单元测试（Mockito + AssertJ）
# 前端：Vitest 工具函数测试（format / validate / gbk）
# 部署仍通过手动 deploy.sh 执行（服务器带宽限制，不适合自动 SCP）

name: CI - Test & Build

on:
  push:
    branches:
      - 'main'
      - 'appmod/**'
    paths:
      - 'procurement-server/**'
      - 'procurement-uniapp/**'
      - '.github/workflows/**'
  pull_request:
    branches:
      - 'main'
  workflow_dispatch:

jobs:
  # ==================== 后端测试 ====================
  backend-test:
    name: Backend - Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run unit tests
        working-directory: procurement-server
        run: mvn test -B

      - name: Build JAR (verify compilation)
        working-directory: procurement-server
        run: mvn package -B -DskipTests

  # ==================== 前端测试 ====================
  frontend-test:
    name: Frontend - Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: procurement-uniapp
        run: npm install

      - name: Run Vitest unit tests
        working-directory: procurement-uniapp
        run: npm run test

      - name: Build WeChat Mini Program
        working-directory: procurement-uniapp
        run: npm run build:mp-weixin
